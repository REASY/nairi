name: nairi-dev

services:
  backend:
    build:
      context: ../..
      dockerfile: docker/images/backend-server/Dockerfile
      args:
        VERSION: "${VERSION:-dev}"
        COMMIT_SHA: "${COMMIT_SHA:-unknown}"
        IMAGE_URL: "${IMAGE_URL:-https://github.com/REASY/nairi}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-https://github.com/REASY/nairi}"
        IMAGE_LICENSES: "${IMAGE_LICENSES:-Apache-2.0}"
        IMAGE_AUTHORS: "${IMAGE_AUTHORS:-Artavazd Balaian <reasyu@gmail.com>}"
    image: nairi/backend-server:dev
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8080/api/v1/auth/google/callback}
      - SESSION_SIGNING_KEY=${SESSION_SIGNING_KEY:-}
      - AUTH_POST_LOGIN_REDIRECT_URL=${AUTH_POST_LOGIN_REDIRECT_URL:-http://localhost:3000/}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - ALLOWED_GOOGLE_HOSTED_DOMAIN=${ALLOWED_GOOGLE_HOSTED_DOMAIN:-}

  frontend:
    build:
      context: ../..
      dockerfile: docker/images/frontend-web/Dockerfile
      args:
        VERSION: "${VERSION:-dev}"
        COMMIT_SHA: "${COMMIT_SHA:-unknown}"
        IMAGE_URL: "${IMAGE_URL:-https://github.com/REASY/nairi}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-https://github.com/REASY/nairi}"
        IMAGE_LICENSES: "${IMAGE_LICENSES:-Apache-2.0}"
        IMAGE_AUTHORS: "${IMAGE_AUTHORS:-Artavazd Balaian <reasyu@gmail.com>}"
    image: nairi/frontend-web:dev
    ports:
      - "3000:80"
    depends_on:
      - backend

  static-analysis:
    build:
      context: ../..
      dockerfile: docker/images/static-analysis/Dockerfile
      args:
        APKTOOL_VERSION: "${APKTOOL_VERSION:-2.11.1}"
        GHIDRA_VERSION: "${GHIDRA_VERSION:-}"
        GHIDRA_RELEASE_DATE: "${GHIDRA_RELEASE_DATE:-}"
        GHIDRA_CLI_REF: "${GHIDRA_CLI_REF:-master}"
        RUST_TOOLCHAIN: "${RUST_TOOLCHAIN:-nightly}"
        JADX_VERSION: "${JADX_VERSION:-1.5.5}"
        GEMINI_CLI_VERSION: "${GEMINI_CLI_VERSION:-0.32.1}"
        VERSION: "${VERSION:-dev}"
        COMMIT_SHA: "${COMMIT_SHA:-unknown}"
        IMAGE_URL: "${IMAGE_URL:-https://github.com/REASY/nairi}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-https://github.com/REASY/nairi}"
        IMAGE_LICENSES: "${IMAGE_LICENSES:-Apache-2.0}"
        IMAGE_AUTHORS: "${IMAGE_AUTHORS:-Artavazd Balaian <reasyu@gmail.com>}"
    image: nairi/static-analysis:dev
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GOOGLE_GEMINI_BASE_URL: "${GOOGLE_GEMINI_BASE_URL:-}"
    profiles:
      - tools
    tty: true
    stdin_open: true

  runtime-analysis:
    build:
      context: ../..
      dockerfile: docker/images/runtime-analysis/Dockerfile
      args:
        GEMINI_CLI_VERSION: "${GEMINI_CLI_VERSION:-0.32.1}"
        ANDROID_CMDLINE_TOOLS_URL: "${ANDROID_CMDLINE_TOOLS_URL:-https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip}"
        ANDROID_PLATFORM_API: "${ANDROID_PLATFORM_API:-36}"
        VERSION: "${VERSION:-dev}"
        COMMIT_SHA: "${COMMIT_SHA:-unknown}"
        IMAGE_URL: "${IMAGE_URL:-https://github.com/REASY/nairi}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-https://github.com/REASY/nairi}"
        IMAGE_LICENSES: "${IMAGE_LICENSES:-Apache-2.0}"
        IMAGE_AUTHORS: "${IMAGE_AUTHORS:-Artavazd Balaian <reasyu@gmail.com>}"
    image: nairi/runtime-analysis:dev
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GOOGLE_GEMINI_BASE_URL: "${GOOGLE_GEMINI_BASE_URL:-}"
      ADB_CONNECTION_STRING: "${ADB_CONNECTION_STRING:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - tools
    tty: true
    stdin_open: true
